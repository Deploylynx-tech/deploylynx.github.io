<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact & Pricing | DeployLynx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-cyan: #00c6ff;
            --dark-bg: #030712;
            --input-bg: rgba(255, 255, 255, 0.05);
            --form-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark-bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        nav { 
            position: sticky; top: 0; z-index: 9999; 
            background: rgba(10, 15, 28, 0.95); backdrop-filter: blur(10px); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; border-bottom: 1px solid var(--glass-border); 
        }
        .logo { font-size: 26px; color: var(--primary-cyan); font-weight: 800; text-decoration: none; }
        .logo span { color: white; }
        .menu { display: flex; align-items: center; gap: 25px; }
        .menu a { color: #94a3b8; text-decoration: none; font-size: 0.95rem; transition: 0.3s; }
        .menu a:hover, .menu a.active { color: var(--primary-cyan); }

        .container-main {
            display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; padding: 60px 8%;
            max-width: 1400px; margin: auto; align-items: flex-start; min-height: 80vh;
        }

        .typing-title { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 800; line-height: 1.1; color: #fff; margin-bottom: 20px; }
        .sub-text { color: #cbd5e1; margin-bottom: 30px; font-size: 1.1rem; line-height: 1.6; }

        .form-column { display: flex; flex-direction: column; gap: 30px; }

        .booking-card {
            background: var(--form-bg); padding: 35px; border-radius: 24px;
            border: 1px solid var(--glass-border); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .single-field { margin-bottom: 15px; }
        
        input, textarea, select {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--input-bg); color: #fff; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary-cyan); background: rgba(255,255,255,0.08); }
        
        .submit-btn {
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            background: var(--primary-cyan); color: #000; font-weight: 800; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .submit-btn:hover:not(:disabled) { background: #fff; box-shadow: 0 10px 20px rgba(0,198,255,0.3); transform: translateY(-2px); }
        .submit-btn:disabled { background: #555; cursor: not-allowed; }

        .cards-column { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .contact-card {
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 16px; transition: 0.3s;
            display: flex; align-items: center; gap: 15px;
        }
        .contact-card:hover { border-color: var(--primary-cyan); transform: scale(1.02); }
        .contact-card a { font-size: 0.95rem; font-weight: 600; color: white; text-decoration: none; word-break: break-all; }

        .premium-animation {
            width: 100%; max-width: 500px; border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 30px rgba(0, 198, 255, 0.15);
            margin: auto; overflow: hidden;
        }
        .premium-animation img { width: 100%; height: auto; display: block; object-fit: cover; }

        /* PRICING */
        .section-pricing { padding: 100px 8%; text-align: center; }
        .price-card {
            background: rgba(15, 23, 42, 0.6); padding: 40px; border-radius: 24px;
            border: 1px solid var(--glass-border); transition: 0.3s;
        }
        .price-val { font-size: 3rem; font-weight: 800; color: var(--primary-cyan); margin: 25px 0; }
        
        .card-btn {
            display: inline-block; width: 100%; padding: 15px; border-radius: 12px;
            background: transparent; border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan); font-weight: 700; cursor: pointer; text-decoration: none; transition: 0.3s;
        }

        #successPopup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0f172a; padding: 40px; border-radius: 25px; border: 2px solid var(--primary-cyan);
            text-align: center; z-index: 99999; box-shadow: 0 0 80px rgba(0, 198, 255, 0.4);
            max-width: 400px; width: 90%;
        }

        @media (max-width: 900px) {
            .container-main { grid-template-columns: 1fr; }
            .cards-column { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">Deploy<span>Lynx</span></a>
    <div class="menu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="case-studies.html">Case Studies</a>
        <a href="contact.html" class="active">Contact</a>
    </div>
</nav>

<div class="container-main">
    <div class="form-column">
        <div>
            <h1 class="typing-title">Ready to Architect?</h1>
            <p class="sub-text">Enterprise-grade infrastructure designed for the next generation of SaaS.</p>

            <div class="booking-card">
                <form id="scheduleForm">
                    <div class="form-row">
                        <input type="date" name="Date" required>
                        <select name="TimeSlot" required>
                            <option value="" disabled selected>Time (PKT)</option>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="03:00 PM">03:00 PM</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <input type="text" name="Name" placeholder="Full Name" required>
                        <input type="email" name="Email" placeholder="Work Email" required>
                    </div>
                    
                    <input type="text" name="Company" placeholder="Company / Startup Name" required class="single-field">

                    <select name="Service" required class="single-field">
                        <option value="" disabled selected>Select Service</option>
                        <option value="Cloud Migration">AWS Cloud Migration</option>
                        <option value="CI/CD">CI/CD Pipeline Automation</option>
                        <option value="Kubernetes">Kubernetes Orchestration</option>
                        <option value="Security">DevSecOps & Security</option>
                    </select>

                    <textarea name="Message" rows="5" placeholder="Tell us about your project infrastructure needs..." class="single-field"></textarea>
                    
                    <button type="submit" id="submitBtn" class="submit-btn">Send Booking Request</button>
                </form>
            </div>
        </div>

        <div class="cards-column">
            <div class="contact-card">
                <div class="text-2xl text-cyan-400">📞</div>
                <div class="card-text">
                    <p class="text-xs text-gray-400">Call Us</p>
                    <a href="tel:+923713600892">+92 371 3600892</a>
                </div>
            </div>
            <div class="contact-card">
                <div class="text-2xl text-cyan-400">✉️</div>
                <div class="card-text">
                    <p class="text-xs text-gray-400">Email</p>
                    <a href="mailto:deploylynx26@gmail.com">deploylynx26@gmail.com</a>
                </div>
            </div>
        </div>
    </div>

    <div class="premium-animation">
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=800" alt="Infrastructure">
    </div>
</div>

<div id="successPopup">
    <div style="font-size: 50px; margin-bottom: 15px;">✨🚀</div>
    <h3 style="color: var(--primary-cyan); font-size: 24px;">Request Received!</h3>
    <p>Our team will get back to you shortly.</p>
    <button onclick="document.getElementById('successPopup').style.display='none'" class="submit-btn" style="width: auto; padding: 10px 30px; margin-top: 20px;">Close</button>
</div>

<script>
    const form = document.getElementById("scheduleForm");
    const submitBtn = document.getElementById("submitBtn");
    const popup = document.getElementById("successPopup");

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "SENDING...";

        const formData = new FormData(form);
        const scriptURL = "https://script.google.com/macros/s/AKfycbz-n69boQvKuZ1b2eomihHO87Tee7ZkyIb2vTpXNoJRapY9KkUY5TqDPMWGvAIglsEm/exec";
        
        fetch(scriptURL, { method: "POST", body: formData, mode: 'no-cors' })
        .then(() => {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            popup.style.display = "block";
            submitBtn.innerText = "Send Booking Request";
            submitBtn.disabled = false;
            form.reset();
        }).catch(err => {
            alert("Error submitting. Please try again.");
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
