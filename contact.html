<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeployLynx | Schedule Consultation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-cyan: #00c6ff;
            --dark-bg: #0a0f1c;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark-bg);
            color: white;
        }

        nav {
            padding: 20px;
            background: #000;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 60px;
        }

        .card {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
        }

        input, select, textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-cyan);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #successPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: black;
            padding: 20px;
            border: 1px solid cyan;
        }
    </style>
</head>

<body>

<nav>DeployLynx</nav>

<div class="container">
    <div class="card">
        <h3>Schedule Call</h3>

        <form id="scheduleForm">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="phone" placeholder="Phone">

            <select name="topic" required>
                <option value="">Select Topic</option>
                <option>Cloud</option>
                <option>Kubernetes</option>
                <option>CI/CD</option>
            </select>

            <select name="time_slot" required>
                <option value="">Select Time</option>
                <option>09:00 AM</option>
                <option>12:00 PM</option>
                <option>03:00 PM</option>
            </select>

            <textarea name="message" placeholder="Description"></textarea>

            <button type="submit" id="btn">Submit</button>
        </form>
    </div>
</div>

<div id="successPopup">
    <h3>✅ Submitted!</h3>
    <button onclick="document.getElementById('successPopup').style.display='none'">Close</button>
</div>

<script>
const form = document.getElementById("scheduleForm");
const btn = document.getElementById("btn");
const popup = document.getElementById("successPopup");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    btn.disabled = true;
    btn.innerText = "Sending...";

    const data = {
        name: form.name.value,
        email: form.email.value,
        phone: form.phone.value,
        topic: form.topic.value,
        timeSlot: form.time_slot.value,
        description: form.message.value,
        secret: "deploylynx_secure_123"
    };

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbwsviX2SGvmvuyGCTt8zVReGmnFBbZWYRJNsNzNbyVH_yLHdFwBAh8c4K4BVh1EmuTt/exec", {
            method: "POST",
            body: JSON.stringify(data),
        });

        const result = await res.json();

        if(result.status === "success"){
            popup.style.display = "block";
            form.reset();
        } else {
            alert("Error");
        }

    } catch (err) {
        alert("Connection error");
    }

    btn.disabled = false;
    btn.innerText = "Submit";
});
</script>

</body>
</html>
