<section class="contact-section">
  <h2>Contact Us</h2>
  <p>Let’s build something powerful together 🚀</p>

  <form action="https://formspree.io/f/xpqykbvr" method="POST" class="contact-form">
    
    <input type="text" name="name" placeholder="Your Name" required>
    
    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

    <!-- Optional hidden fields -->
    <input type="hidden" name="_subject" value="New DeployLynx Inquiry">
    <input type="hidden" name="_replyto" value="deploylynx26@gmail.com">

    <button type="submit">Send Message</button>
  </form>

</section>
