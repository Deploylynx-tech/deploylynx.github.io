<!-- ================= CHATBOT UI ================= -->
<style>
#chatbotIcon{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00c6ff;
  color:#000;
  padding:12px 15px;
  border-radius:50%;
  cursor:pointer;
  z-index:9999;
  font-size:18px;
  box-shadow:0 0 15px #00c6ff;
}

#chatbotWindow{
  position:fixed;
  bottom:80px;
  right:20px;
  width:300px;
  height:400px;
  background:#0a0f1c;
  border:1px solid #00c6ff;
  border-radius:12px;
  display:none;
  flex-direction:column;
  z-index:9999;
}

#chatbotHeader{
  background:#00c6ff;
  color:#000;
  padding:10px;
  cursor:pointer;
  font-weight:bold;
}

#chatbotMessages{
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

#chatbotInput{
  display:flex;
}

#chatbotInput input{
  flex:1;
  padding:8px;
  border:none;
  outline:none;
}

#chatbotInput button{
  background:#00c6ff;
  border:none;
  padding:8px;
  cursor:pointer;
}
</style>

<div id="chatbotIcon">💬</div>

<div id="chatbotWindow">
  <div id="chatbotHeader">AI Assistant (Click to Close)</div>
  <div id="chatbotMessages"></div>

  <div id="chatbotInput">
    <input type="text" id="chatInput" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const icon = document.getElementById("chatbotIcon");
const windowBox = document.getElementById("chatbotWindow");
const header = document.getElementById("chatbotHeader");
const messages = document.getElementById("chatbotMessages");
const input = document.getElementById("chatInput");
const send = document.getElementById("sendBtn");

let userEmail = "";
let stage = "start";

icon.onclick = ()=> windowBox.style.display="flex";
header.onclick = ()=> windowBox.style.display="none";

function addMsg(text,type){
  const div = document.createElement("div");
  div.style.padding="8px";
  div.style.borderRadius="8px";
  div.style.maxWidth="85%";

  if(type==="user"){
    div.style.background="#00c6ff";
    div.style.color="#000";
    div.style.alignSelf="flex-end";
  } else {
    div.style.background="#111";
    div.style.color="#00c6ff";
    div.style.alignSelf="flex-start";
  }

  div.innerText=text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function botReply(text){
  setTimeout(()=> addMsg(text,"bot"),500);
}

/* 🔥 SMART HUMAN-LIKE FLOW */
function handleAI(text){

  const t = text.toLowerCase();

  if(stage==="start"){
    stage="ask_problem";
    return "Hi 👋 Thanks for reaching out to DeployLynx.\n\nCould you briefly tell me about your project or what you're trying to achieve?";
  }

  if(t.includes("traffic") || t.includes("ecommerce")){
    stage="solution";
    return "Got it 👍\n\nFor eCommerce growth, traffic alone isn’t enough — your infrastructure must handle users smoothly.\n\nWe usually help with:\n✔ Fast loading speeds\n✔ Scalable backend (no crashes)\n✔ Optimized deployments\n\nThis directly improves both traffic retention & conversions.\n\nCan I ask — are you currently hosted on AWS, VPS, or shared hosting?";
  }

  if(t.includes("aws") || t.includes("server") || t.includes("hosting")){
    stage="pricing";
    return "Perfect — that helps.\n\nBased on your requirement (high availability within 1 week), we can set up:\n\n✔ CI/CD pipeline\n✔ Load-balanced deployment\n✔ Auto-scaling infrastructure\n\n💰 Pricing depends on complexity, but most projects range between **$150 – $500**.\n\nTo guide you properly, may I have your email?";
  }

  if(stage==="pricing"){
    userEmail = text;

    /* 🔥 SAVE LEAD TO GOOGLE SHEET */
    fetch("https://script.google.com/macros/s/AKfycbztEuM2vU1PhSe5x4qr7N-FSvyFriPQtkuAEP74UxieW6sRRxQXps-Q-tjmhAmbSJ-KFg/exec",{
      method:"POST",
      body:JSON.stringify({
        email:userEmail,
        message:"Chatbot Lead"
      }),
      headers:{"Content-Type":"application/json"},
      mode:"no-cors"
    });

    stage="close";

    return "Thanks! 🙌\n\nI’ve noted your details.\n\n👉 For faster communication, let’s continue on WhatsApp where we can discuss your project in real-time:\n\nhttps://wa.me/923XXXXXXXXX?text=Hi%20I%20need%20DevOps%20help\n\nLooking forward to helping you scale 🚀";
  }

  return "I understand 👍 Could you share a bit more detail so I can guide you better?";
}

send.onclick = ()=>{
  const val = input.value.trim();
  if(!val) return;

  addMsg(val,"user");
  input.value="";

  const reply = handleAI(val);
  botReply(reply);
};

input.addEventListener("keypress",e=>{
  if(e.key==="Enter") send.click();
});
</script>
