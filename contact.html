<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeployLynx | Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0a0f1c;color:#fff;overflow:hidden;}

nav{display:flex;justify-content:space-between;padding:20px 50px;z-index:10;}
.logo{color:#00c6ff;font-weight:bold;cursor:pointer;}
.menu a{margin-left:25px;color:#ccc;text-decoration:none;}
.menu a:hover{color:#00c6ff;}

canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none;}

.container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:90vh;z-index:2;}

.visual{position:absolute;left:80px;}

.form-card{background:rgba(0,0,0,0.75);padding:30px;border-radius:15px;width:340px;}
.form-card input,.form-card textarea{width:100%;margin-bottom:15px;padding:10px;background:#111;border:none;color:#fff;border-radius:8px;}
.form-card button{width:100%;padding:10px;background:#00c6ff;border:none;border-radius:8px;cursor:pointer;}

.whatsapp-btn{display:flex;justify-content:center;margin-top:10px;background:#25D366;padding:10px;border-radius:8px;color:#fff;text-decoration:none;}

.social{display:flex;gap:20px;margin-top:10px;}
.social a{padding:10px;background:#111;border-radius:8px;color:#fff;text-decoration:none;}

.cursor{width:10px;height:10px;background:gold;position:fixed;border-radius:50%;pointer-events:none;z-index:999;}

#chatbotIcon{position:fixed;right:20px;bottom:20px;background:#00c6ff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1000;}
#chatbotWindow{position:fixed;right:20px;bottom:90px;width:320px;height:420px;background:#000;border-radius:15px;display:none;flex-direction:column;z-index:1000;}
#chatbotMessages{flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;}
#chatbotInput{display:flex;}
#chatbotInput input{flex:1;padding:10px;background:#111;border:none;color:#fff;}
#chatbotInput button{padding:10px;background:#00c6ff;border:none;}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<nav>
  <div class="logo" onclick="window.location.href='index.html'">DeployLynx</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Case Studies</a>
    <a href="#">Contact</a>
  </div>
</nav>

<div class="container">

<div class="visual">
<lottie-player src="https://assets2.lottiefiles.com/packages/lf20_kyu7xb1v.json" background="transparent" speed="1" style="width:320px;height:320px;" loop autoplay></lottie-player>
</div>

<div class="form-card">
<h2>Contact Us</h2>

<form id="contactForm" action="https://formspree.io/f/xpqykbvr" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Message" required></textarea>
<button type="submit">Send Message</button>
</form>

<a href="https://wa.me/message/VXHPTQC4ZU46A1?text=Hi%20DeployLynx%20I%20need%20help" target="_blank" class="whatsapp-btn">💬 Chat on WhatsApp</a>
</div>

<div class="social">
<a href="https://github.com/Deploylynx-tech" target="_blank">GitHub</a>
<a href="https://linkedin.com" target="_blank">LinkedIn</a>
<a href="mailto:deploylynx26@gmail.com">Email</a>
<a href="https://instagram.com" target="_blank">Instagram</a>
</div>

</div>

<div id="chatbotIcon">💬</div>

<div id="chatbotWindow">
<div id="chatbotMessages"></div>
<div id="chatbotInput">
<input type="text" id="chatInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
// cursor
document.addEventListener("mousemove",e=>{
document.querySelector(".cursor").style.left=e.clientX+"px";
document.querySelector(".cursor").style.top=e.clientY+"px";
});

// chatbot
let history=[];
let askedEmail=false;

function addMsg(text,from){
const div=document.createElement("div");
div.style.margin="6px";
div.style.padding="10px";
div.style.borderRadius="8px";
div.style.maxWidth="85%";
div.style.background=from==="user"?"#00c6ff":"#111";
div.style.color=from==="user"?"#000":"#00c6ff";
div.innerText=text;
document.getElementById("chatbotMessages").appendChild(div);
div.scrollIntoView();
}

function aiReply(text){
let t=text.toLowerCase();
history.push(t);
let ctx=history.join(" ");

if(t.includes("price") || t.includes("charges") || t.includes("cost")){
return "Our pricing depends on your project requirements, but for an eCommerce setup like yours, we usually offer flexible packages. To give you an accurate quote, I’d recommend a quick discussion. Would you like to continue on WhatsApp?";
}

if(ctx.includes("ecommerce")){
return "Great — scaling an eCommerce website requires high performance, uptime, and smooth deployment. We can help you handle traffic spikes and improve speed significantly.";
}

if(ctx.includes("traffic")){
return "To increase your traffic, we focus on improving performance, uptime, and scalability — which directly impacts SEO and user experience.";
}

if(ctx.includes("deploy")){
return "We can deploy your website within 5–7 days with high availability, load balancing, and automated CI/CD pipelines.";
}

if(ctx.includes("ci") || ctx.includes("cd")){
return "We’ll set up a full CI/CD pipeline so your deployments are automated, fast, and error-free.";
}

if(!askedEmail && history.length>=3){
askedEmail=true;
return "This looks like a great project 🚀 Could you share your email? I can have our team send you a proper plan and pricing.";
}

if(askedEmail && t.includes("@")){
return "Perfect 👍 Our team will reach out to you shortly. For faster response, you can also connect with us on WhatsApp: https://wa.me/message/VXHPTQC4ZU46A1";
}

return "Got it 👍 Based on your requirements, we can definitely help. Could you share a bit more detail so I can guide you better?";
}

function sendMessage(){
let input=document.getElementById("chatInput");
let val=input.value.trim();
if(!val) return;

addMsg(val,"user");
input.value="";

setTimeout(()=>{
let reply=aiReply(val);
addMsg(reply,"ai");

// send to Google Sheet
fetch("https://script.google.com/macros/s/AKfycbztEuM2vU1PhSe5x4qr7N-FSvyFriPQtkuAEP74UxieW6sRRxQXps-Q-tjmhAmbSJ-KFg/exec",{
method:"POST",
body:JSON.stringify({chat:history.join(" | ")})
});

},600);
}

// toggle
document.getElementById("chatbotIcon").onclick=()=>{
let w=document.getElementById("chatbotWindow");
w.style.display=w.style.display==="flex"?"none":"flex";
};
</script>

</body>
</html>
