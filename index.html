<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeployLynx | Home</title>

    <style>
        :root {
            --primary-blue: #38bdf8;
            --dark-bg: #0f172a;
            --nav-bg: #020617;
            --accent-glow: rgba(56, 189, 248, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            cursor: none;
        }

        /* CANVAS BACKGROUND REMAINS UNTOUCHED */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .cursor {
            position: fixed;
            width: 15px;
            height: 15px;
            pointer-events: none;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px var(--primary-blue), 0 0 30px var(--primary-blue);
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* NAVBAR - HIGHER CONTRAST */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(2, 6, 23, 0.85);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }

        #logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary-blue);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-blue);
            text-shadow: 0 0 10px var(--primary-blue);
        }

        /* HERO - PREMIUM ALIGNMENT */
        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(45px, 10vw, 85px);
            background: linear-gradient(to bottom, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .hero p {
            font-size: clamp(16px, 4vw, 20px);
            color: #94a3b8;
            max-width: 600px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* NUMAN-STYLE CTA BUTTON */
        .btn-main {
            margin-top: 30px;
            padding: 14px 32px;
            background: var(--primary-blue);
            color: var(--nav-bg);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.4s;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px var(--primary-blue);
        }

        /* SERVICES - BORDER BEAM EFFECT */
        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            padding: 60px 10%;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-blue);
            background: rgba(56, 189, 248, 0.05);
        }

        .card strong {
            display: block;
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #f8fafc;
        }

        /* STATS SECTION */
        .stats {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 80px 20px;
            background: rgba(2, 6, 23, 0.4);
        }

        .stat-item {
            text-align: center;
        }

        .counter {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-blue);
            display: block;
        }

        .stat-item small {
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* FOOTER */
        footer {
            padding: 40px;
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.02);
        }

        /* MOBILE OPTIMIZATIONS */
        @media screen and (max-width: 768px) {
            body { cursor: default; }
            .cursor { display: none; }
            
            nav { padding: 15px 5%; }
            .menu-toggle { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
            .menu-toggle span { width: 25px; height: 2px; background: white; }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--nav-bg);
                flex-direction: column;
                padding: 20px 0;
                border-bottom: 2px solid var(--primary-blue);
            }

            .nav-links.active { display: flex; }
            .nav-links a { margin: 15px 0; font-size: 1.1rem; }

            .hero h1 { font-size: 50px; }
            .stats { flex-direction: column; gap: 30px; }
            .services { padding: 40px 5%; }
        }
    </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="tech"></canvas>

<nav>
    <div id="logo"></div>
    <div class="menu-toggle" id="mobile-menu">
        <span></span><span></span><span></span>
    </div>
    <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="case-studies.html">Case Studies</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1>DeployLynx</h1>
    <p>Engineering the Digital Future</p>
    <div id="quote" style="color:var(--primary-blue); margin-top:10px; font-weight: 500; opacity: 0.8;"></div>
    <a href="contact.html" class="btn-main">Start a Project</a>
</section>

<section class="services">
    <div class="card">
        <span class="icon">⚙️</span>
        <strong>DevOps CI/CD</strong>
    </div>
    <div class="card">
        <span class="icon">☁️</span>
        <strong>Cloud Architecture</strong>
    </div>
    <div class="card">
        <span class="icon">🤖</span>
        <strong>AI Automation</strong>
    </div>
    <div class="card">
        <span class="icon">🛡️</span>
        <strong>DevSecOps</strong>
    </div>
</section>

<section class="stats">
    <div class="stat-item">
        <span class="counter" id="stars">0</span>
        <small>GitHub Stars</small>
    </div>
    <div class="stat-item">
        <span class="counter" id="forks">0</span>
        <small>Total Forks</small>
    </div>
</section>

<footer>
    DeployLynx &copy; 2025 | Powering Global Cloud Infrastructures
</footer>

<script>
/* MOBILE MENU */
const menuToggle = document.getElementById('mobile-menu');
const navLinks = document.getElementById('nav-links');
menuToggle.addEventListener('click', () => navLinks.classList.toggle('active'));

/* CURSOR */
const cursor = document.getElementById("cursor");
if (window.matchMedia("(pointer: fine)").matches) {
    document.addEventListener("mousemove", e => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
}

/* EXISTING TECH BACKGROUND LOGIC */
const canvas = document.getElementById("tech");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let particles = [];
const particleCount = window.innerWidth < 768 ? 30 : 60;
for (let i = 0; i < particleCount; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        dx: (Math.random() - 0.5) * 1.5,
        dy: (Math.random() - 0.5) * 1.5
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.x += p.dx; p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        ctx.fillStyle = "rgba(56, 189, 248, 0.4)";
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
    });
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            let dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
            if (dist < 120) {
                ctx.strokeStyle = `rgba(56, 189, 248, ${0.15 - dist/800})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
            }
        }
    }
    requestAnimationFrame(draw);
}
draw();

/* TYPING LOGIC */
const logo = document.getElementById("logo");
const quote = document.getElementById("quote");
let t = "DeployLynx", i = 0;
let q = "DevOps • Cloud • Automation", j = 0;

function animLogo() {
    if (i < t.length) { logo.innerHTML += t[i++]; setTimeout(animLogo, 100); }
    else { setTimeout(() => { logo.innerHTML = ""; i = 0; animLogo(); }, 4000); }
}
function typeQ() {
    if (j < q.length) { quote.innerHTML += q[j++]; setTimeout(typeQ, 60); }
}
animLogo(); typeQ();

/* GITHUB API SIMULATION/FETCH */
// Replace with your actual repo logic if needed
document.getElementById("stars").innerText = "48";
document.getElementById("forks").innerText = "12";
</script>

</body>
</html>
