<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeployLynx</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <style>
        /* CORE LAYOUT */
        :root {
            --primary-cyan: #38bdf8;
            --dark-bg: #020617;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            background: var(--dark-bg);
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: bold; font-size: 18px; color: white; min-width: 100px; }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        nav a:hover { color: var(--primary-cyan); }

        section {
            padding: 60px 10%;
            text-align: center;
        }

        .quote {
            margin-top: 20px;
            font-size: 18px;
            color: #ffb6c1;
            height: 25px;
            margin-bottom: 40px;
        }

        /* TOOLS GRID WITH ICONS */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 25px;
            margin: 40px auto;
            max-width: 1000px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(56, 189, 248, 0.1);
            padding: 25px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #cbd5e1;
            transition: 0.4s ease;
            animation: float 4s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .tool-card i { font-size: 35px; opacity: 0.8; transition: 0.3s; }

        .tool-card:hover {
            border-color: var(--primary-cyan);
            background: rgba(56, 189, 248, 0.08);
            color: white;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transform: scale(1.05);
        }

        .tool-card:hover i { opacity: 1; transform: scale(1.1); }

        /* GITHUB ACTIVITY */
        .stats {
            padding: 60px 20px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .counter {
            font-size: 32px;
            color: var(--primary-cyan);
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #64748b;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .tool-card:nth-child(even) { animation-delay: 1s; }
        .tool-card:nth-child(3n) { animation-delay: 2s; }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <div class="logo" id="logoText"></div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section>
    <h1 style="font-size:70px;-webkit-text-stroke:1px #38bdf8;color:transparent;margin-bottom:10px;">
        DeployLynx
    </h1>
    <p style="letter-spacing: 2px; color: #94a3b8;">AI Automation • DevOps • Cloud Solutions</p>
    <div class="quote" id="quote"></div>

    <div class="tools-grid">
        <div class="tool-card"><i class="devicon-docker-plain colored"></i>Docker</div>
        <div class="tool-card"><i class="devicon-linux-plain colored"></i>Linux</div>
        <div class="tool-card"><i class="devicon-git-plain colored"></i>Git</div>
        <div class="tool-card"><i class="devicon-github-original colored"></i>GitHub</div>
        <div class="tool-card"><i class="devicon-python-plain colored"></i>AI / LLM</div>
        <div class="tool-card"><i class="devicon-kubernetes-plain colored"></i>Kubernetes</div>
        <div class="tool-card"><i class="devicon-terraform-plain colored"></i>Terraform</div>
        <div class="tool-card"><i class="devicon-prometheus-original colored"></i>Prometheus</div>
        <div class="tool-card"><i class="devicon-grafana-original colored"></i>Grafana</div>
        <div class="tool-card"><i class="devicon-amazonwebservices-plain-wordmark colored"></i>AWS</div>
    </div>
</section>

<section class="stats">
    <h2 style="margin-bottom: 40px; font-size: 1.5rem;">GitHub Activity</h2>
    <div class="stat-item">
        <span style="font-size: 30px;">⭐</span>
        <span style="color: #cbd5e1;">Stars:</span>
        <span id="stars" class="counter">0</span>
    </div>
    <div class="stat-item">
        <span style="font-size: 30px;">🍴</span>
        <span style="color: #cbd5e1;">Forks:</span>
        <span id="forks" class="counter">0</span>
    </div>
</section>

<footer>
    DeployLynx © 2025 All Rights Reserved
</footer>

<script>
    /* BACKGROUND DOTS */
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    let dots = [];
    for(let i=0;i<80;i++){
        dots.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, dx:(Math.random()-0.5), dy:(Math.random()-0.5) });
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        dots.forEach(d=>{
            d.x+=d.dx; d.y+=d.dy;
            if(d.x<0||d.x>canvas.width) d.dx*=-1;
            if(d.y<0||d.y>canvas.height) d.dy*=-1;
            ctx.fillStyle="#38bdf8"; ctx.beginPath(); ctx.arc(d.x,d.y,2,0,Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();

    /* LOGO ANIMATION */
    let text="DeployLynx", i=0, logoEl = document.getElementById("logoText");
    function animateLogo(){
        if(i<text.length){ logoEl.innerHTML+=text.charAt(i); i++; setTimeout(animateLogo,120); }
        else{ setTimeout(()=>{ logoEl.innerHTML=""; i=0; animateLogo(); },1500); }
    }
    animateLogo();

    /* QUOTE TYPING */
    let quoteText="Engineering scalable systems. Automating the future.", j=0;
    function typeQuote(){
        if(j<quoteText.length){ document.getElementById("quote").innerHTML+=quoteText.charAt(j); j++; setTimeout(typeQuote,50); }
    }
    typeQuote();

    /* GITHUB API DATA */
    fetch("https://api.github.com/repos/Deploylynx/deploylynx-devsecops-pipeline")
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("stars").innerText=data.stargazers_count || 22;
        document.getElementById("forks").innerText=data.forks_count || 2o;
    }).catch(() => {
        document.getElementById("stars").innerText="2";
        document.getElementById("forks").innerText="0";
    });
</script>

</body>
</html>
