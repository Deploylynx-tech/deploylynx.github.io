<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeployLynx - Cloud & DevOps Solutions</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #050a14;
            --primary-cyan: #00c6ff;
            --accent-purple: #ff6ec7;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* Background Dots */
        #dotsBackground {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(5, 10, 20, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 24px; font-weight: bold; color: white; }
        .logo span { color: var(--primary-cyan); }
        .nav-links a { color: #ccc; margin: 0 15px; text-decoration: none; font-size: 14px; }
        .contact-btn { background: #3b82f6; padding: 10px 20px; border-radius: 8px; color: white; text-decoration: none; }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 80px 8%;
            min-height: 80vh;
        }

        .hero-text { flex: 1; max-width: 600px; }
        .hero-text h1 { font-size: 64px; line-height: 1.1; margin-bottom: 20px; }
        .hero-text h1 span {
            background: linear-gradient(90deg, var(--primary-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Booking Form Styles */
        .form-col { flex: 1; display: flex; justify-content: flex-end; }
        .booking-card {
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 400px;
        }

        .booking-card h3 { margin-bottom: 20px; font-size: 22px; }
        .booking-card input, .booking-card select, .booking-card textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .booking-card button {
            width: 100%;
            padding: 14px;
            background: var(--primary-cyan);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .booking-card button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Success Popup */
        #successPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            border: 1px solid var(--primary-cyan);
            box-shadow: 0 0 30px rgba(0, 198, 255, 0.2);
        }

        #successPopup button {
            margin-top: 20px;
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 25px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="dotsBackground"></canvas>

<nav>
    <div class="logo">Deploy<span>Lynx</span></div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Case Studies</a>
        <a href="#">About</a>
    </div>
    <a href="#" class="contact-btn">Contact</a>
</nav>

<section class="hero">
    <div class="hero-text">
        <p style="color: var(--primary-cyan); text-transform: uppercase; letter-spacing: 2px;">Direct Communication</p>
        <h1>Ready to <br><span>architect <br>the future?</span></h1>
        <p style="color: #aaa; font-size: 18px;">DeployLynx builds scalable, secure, and production-ready systems. Schedule your deep dive into cloud reliability today.</p>
    </div>

    <div class="form-col">
        <div class="booking-card">
            <h3>Schedule Your Call</h3>
            <form id="scheduleForm">
                <input type="text" name="Name" placeholder="Your Name" required>
                <input type="email" name="Email" placeholder="Your Email" required>
                <select name="Topic" required>
                    <option value="" disabled selected>Select a Topic</option>
                    <option value="Cloud Migration">Cloud Migration</option>
                    <option value="Kubernetes">Kubernetes Architecture</option>
                    <option value="CI/CD">CI/CD Pipeline</option>
                    <option value="Other">Other</option>
                </select>
                <input type="date" name="Date" required>
                <select name="Time" required>
                    <option value="" disabled selected>Select Time (PKT)</option>
                    <option value="09:00 AM">09:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="03:00 PM">03:00 PM</option>
                </select>
                <textarea name="Message" rows="3" placeholder="Brief Description"></textarea>
                <button type="submit" id="submitBtn">Book Consultation</button>
            </form>
        </div>
    </div>
</section>

<div id="successPopup">
    <div style="font-size: 50px; margin-bottom: 15px;">✨</div>
    <h3 style="color: var(--primary-cyan); font-size: 24px;">Message Sent!</h3>
    <p style="color: white; margin-top: 10px;">Shortly we will contact with you.</p>
    <button id="closePopup">Close</button>
</div>

<script>
    // YOUR JAVASCRIPT LOGIC
    const form = document.getElementById("scheduleForm");
    const submitBtn = document.getElementById("submitBtn");
    const popup = document.getElementById("successPopup");

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "SENDING...";

        const formData = new FormData(form);

        // 1. Send to Formspree
        fetch("https://formspree.io/f/xpqykbvr", {
            method: "POST",
            body: formData,
            headers: { 'Accept': 'application/json' }
        });

        // 2. Send to Google Sheets
        const scriptURL = "https://script.google.com/macros/s/AKfycbz-n69boQvKuZ1b2eomihHO87Tee7ZkyIb2vTpXNoJRapY9KkUY5TqDPMWGvAIglsEm/exec";
        
        fetch(scriptURL, {
            method: "POST",
            body: formData,
            mode: 'no-cors'
        }).then(() => {
            confetti({ 
                particleCount: 150, 
                spread: 70, 
                origin: { y: 0.6 }, 
                colors: ['#00c6ff', '#ff6ec7', '#ffffff'] 
            });
            popup.style.display = "block";
            submitBtn.innerText = "Book Consultation";
            submitBtn.disabled = false;
            form.reset();
        }).catch(err => {
            console.error("Sheet Error", err);
            submitBtn.disabled = false;
            submitBtn.innerText = "Book Consultation";
        });
    });

    document.getElementById("closePopup").onclick = () => popup.style.display = "none";

    // Animated Background
    const canvas = document.getElementById("dotsBackground");
    const ctx = canvas.getContext("2d");
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    let dotsArr = [];
    for(let i=0; i<60; i++) dotsArr.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vy: Math.random() * 0.3 });
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(0, 198, 255, 0.3)";
        dotsArr.forEach(d => { d.y += d.vy; if(d.y > canvas.height) d.y = 0; ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI * 2); ctx.fill(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
