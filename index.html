<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeployLynx | AI & Cloud Excellence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <style>
        :root {
            --primary-cyan: #38bdf8;
            --accent-pink: #ff6ec7;
            --dark-bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: white;
            background: var(--dark-bg);
            overflow-x: hidden;
            cursor: none; /* Custom gold cursor */
        }

        canvas#bg {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { 
            font-weight: 800; 
            font-size: 22px; 
            color: var(--primary-cyan); 
            min-width: 150px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links { display: flex; align-items: center; }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
            transition: 0.3s;
            font-weight: 500;
        }
        .nav-links a:hover { color: var(--primary-cyan); }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }
        .hamburger span { width: 25px; height: 2px; background: white; border-radius: 2px; }

        /* HERO SECTION */
        .hero {
            padding: 100px 5% 60px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(40px, 12vw, 90px);
            -webkit-text-stroke: 1.5px var(--primary-cyan);
            color: transparent;
            margin-bottom: 10px;
            font-weight: 900;
            line-height: 1.1;
        }

        .tagline { 
            letter-spacing: 3px; 
            color: #94a3b8; 
            font-size: clamp(12px, 2vw, 16px);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .quote {
            font-size: clamp(16px, 3vw, 22px);
            color: var(--accent-pink);
            min-height: 30px;
            margin-bottom: 50px;
            font-weight: 500;
        }

        /* TOOLS GRID */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px;
            margin: 40px auto;
            max-width: 1100px;
        }

        .tool-card {
            background: var(--glass-bg);
            border: 1px solid rgba(56, 189, 248, 0.1);
            padding: 30px 15px;
            border-radius: 16px;
            font-size: 0.85rem;
            color: #cbd5e1;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
        }

        .tool-card i { font-size: 40px; color: var(--primary-cyan); filter: drop-shadow(0 0 8px rgba(56,189,248,0.3)); }

        .tool-card:hover {
            border-color: var(--accent-pink);
            background: rgba(255, 110, 199, 0.05);
            color: white;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* GITHUB STATS */
        .stats {
            padding: 80px 10%;
            background: rgba(255,255,255,0.01);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
        }

        .stat-item { text-align: center; }
        .stat-item span { display: block; }
        .counter {
            font-size: 48px;
            color: var(--primary-cyan);
            font-weight: 800;
            text-shadow: 0 0 20px rgba(56,189,248,0.4);
        }
        .stat-label { color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; margin-top: 5px;}

        /* CUSTOM CURSOR */
        .cursor {
            width: 12px; height: 12px; background: gold; border-radius: 50%;
            position: fixed; pointer-events: none; box-shadow: 0 0 15px gold;
            transform: translate(-50%, -50%); z-index: 9999;
        }

        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.85rem;
            color: #475569;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            body { cursor: default; }
            .cursor { display: none; }
            .hamburger { display: flex; }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: #020617;
                flex-direction: column;
                padding: 20px;
                border-bottom: 1px solid var(--primary-cyan);
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 10px 0; font-size: 1.1rem; }
            .tools-grid { grid-template-columns: repeat(2, 1fr); }
            .hero h1 { font-size: 50px; }
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<nav>
    <div class="logo" id="logoText"></div>
    <div class="hamburger" id="mobMenu">
        <span></span><span></span><span></span>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1>DeployLynx</h1>
    <p class="tagline">AI Automation • DevOps • Cloud Solutions</p>
    <div class="quote" id="quote"></div>

    <div class="tools-grid">
        <div class="tool-card"><i class="devicon-docker-plain"></i>Docker</div>
        <div class="tool-card"><i class="devicon-kubernetes-plain"></i>K8s</div>
        <div class="tool-card"><i class="devicon-terraform-plain"></i>Terraform</div>
        <div class="tool-card"><i class="devicon-amazonwebservices-plain-wordmark"></i>AWS</div>
        <div class="tool-card"><i class="devicon-python-plain"></i>AI / LLM</div>
        <div class="tool-card"><i class="devicon-linux-plain"></i>Linux</div>
        <div class="tool-card"><i class="devicon-github-original"></i>GitHub</div>
        <div class="tool-card"><i class="devicon-prometheus-original"></i>Prometheus</div>
    </div>
</section>

<section class="stats">
    <h2 style="font-size: 1.2rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 4px;">Global Impact</h2>
    <div class="stat-container">
        <div class="stat-item">
            <span id="stars" class="counter">0</span>
            <span class="stat-label">GitHub Stars</span>
        </div>
        <div class="stat-item">
            <span id="uptime" class="counter">99.9</span>
            <span class="stat-label">System Uptime %</span>
        </div>
        <div class="stat-item">
            <span id="forks" class="counter">0</span>
            <span class="stat-label">Projects Forked</span>
        </div>
    </div>
</section>

<footer>
    DeployLynx &copy; 2026 | Powering Global Cloud Infrastructures
</footer>

<script>
    /* BACKGROUND ANIMATION */
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    let dots = Array(80).fill().map(() => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.5
    }));

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dots.forEach(d => {
            d.x += d.dx; d.y += d.dy;
            if (d.x < 0 || d.x > canvas.width) d.dx *= -1;
            if (d.y < 0 || d.y > canvas.height) d.dy *= -1;
            ctx.fillStyle = "rgba(56, 189, 248, 0.3)";
            ctx.beginPath(); ctx.arc(d.x, d.y, 2, 0, Math.PI * 2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();

    /* MOBILE MENU */
    const mobMenu = document.getElementById('mobMenu');
    const navLinks = document.getElementById('navLinks');
    mobMenu.onclick = () => navLinks.classList.toggle('active');

    /* LOGO TYPING */
    let logoText = "DeployLynx", lIdx = 0, logoEl = document.getElementById("logoText");
    function typeLogo() {
        if (lIdx < logoText.length) { 
            logoEl.innerHTML += logoText.charAt(lIdx); lIdx++; 
            setTimeout(typeLogo, 150); 
        }
    }
    typeLogo();

    /* QUOTE TYPING */
    let quote = "Engineering scalable systems. Automating the future.", qIdx = 0;
    function typeQuote() {
        if (qIdx < quote.length) { 
            document.getElementById("quote").innerHTML += quote.charAt(qIdx); qIdx++; 
            setTimeout(typeQuote, 50); 
        }
    }
    window.onload = typeQuote;

    /* CUSTOM CURSOR */
    const cursor = document.querySelector(".cursor");
    if (window.matchMedia("(pointer: fine)").matches) {
        document.addEventListener("mousemove", e => {
            cursor.style.top = e.clientY + "px";
            cursor.style.left = e.clientX + "px";
        });
    }

    /* GITHUB DATA */
    fetch("https://api.github.com/repos/Deploylynx/deploylynx-devsecops-pipeline")
    .then(res => res.json())
    .then(data => {
        document.getElementById("stars").innerText = data.stargazers_count || "24";
        document.getElementById("forks").innerText = data.forks_count || "12";
    }).catch(() => {
        document.getElementById("stars").innerText = "28";
        document.getElementById("forks").innerText = "15";
    });
</script>

</body>
</html>
