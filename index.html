<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeployLynx</title>

<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>

<style>

/* BACKGROUND GRADIENT ANIMATION */
body{
background:linear-gradient(270deg,#0f172a,#020617,#1e293b);
background-size:600% 600%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
padding:20px;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(56,189,248,0.5);
}

/* NAV LOGO */
.logo{
color:white;
font-weight:bold;
}

/* SERVICE ICON ANIMATION */
.icon{
font-size:30px;
margin-bottom:10px;
display:block;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

/* QUOTE */
.quote{
margin-top:20px;
color:#ffb6c1;
height:25px;
}

/* STATS */
.stats{
text-align:center;
padding:40px;
}

.counter{
font-size:30px;
color:#38bdf8;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>

</head>

<body>

<nav>
<div class="logo" id="logoText"></div>

<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
<a onclick="toggleTheme()">Theme</a>
</div>
</nav>

<section>

<h1 style="font-size:70px;-webkit-text-stroke:1px #38bdf8;color:transparent;">
DeployLynx
</h1>

<p>AI Automation • DevOps • Cloud Solutions</p>

<div class="quote" id="quote"></div>

</section>

<!-- SERVICES PREVIEW -->
<section>

<h2>Core Services</h2>

<div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;">

<div class="card">
<span class="icon">⚙️</span>
DevOps CI/CD
</div>

<div class="card">
<span class="icon">☁️</span>
AWS Cloud
</div>

<div class="card">
<span class="icon">🤖</span>
AI Automation
</div>

<div class="card">
<span class="icon">🐳</span>
Docker & Kubernetes
</div>

</div>

</section>

<!-- GITHUB STATS -->
<section class="stats">

<h2>GitHub Activity</h2>

⭐ Stars: <span id="stars" class="counter">0</span><br><br>
🍴 Forks: <span id="forks" class="counter">0</span>

</section>

<footer>
DeployLynx © 2026 All Rights Reserved
</footer>

<script>

/* LOGO LOOP */
let text="DeployLynx";
let i=0;

function animateLogo(){
if(i<text.length){
document.getElementById("logoText").innerHTML+=text.charAt(i);
i++;
setTimeout(animateLogo,120);
}else{
setTimeout(()=>{
document.getElementById("logoText").innerHTML="";
i=0;
animateLogo();
},1500);
}
}
animateLogo();

/* QUOTE */
let quoteText="Engineering scalable systems. Automating the future.";
let j=0;

function typeQuote(){
if(j<quoteText.length){
document.getElementById("quote").innerHTML+=quoteText.charAt(j);
j++;
setTimeout(typeQuote,50);
}
}
typeQuote();

/* FIXED GITHUB STATS (MULTIPLE REPOS) */

const repos = [
"deploylynx-monitoring",
"deploylynx-infrastructure",
"deploylynx-devsecops-pipeline",
"ai-automation-tools"
];

let totalStars = 0;
let totalForks = 0;

repos.forEach(repo=>{
fetch(`https://api.github.com/repos/Deploylynx/${repo}`)
.then(res=>res.json())
.then(data=>{
totalStars += data.stargazers_count || 0;
totalForks += data.forks_count || 0;

document.getElementById("stars").innerText = totalStars;
document.getElementById("forks").innerText = totalForks;
});
});

</script>

</body>
</html>
