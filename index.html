<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeployLynx | Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-cyan: #00c6ff;
            --accent-purple: #ff6ec7;
            --dark-bg: #030712;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark-bg); color: #fff; overflow-x: hidden; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 8%;
            background: rgba(10, 15, 28, 0.9); backdrop-filter: blur(10px);
        }
        .logo { font-size: 24px; font-weight: bold; color: white; text-decoration: none; }
        .logo span { color: #ccc; }
        .nav-links a { margin-left: 25px; color: #94a3b8; text-decoration: none; font-size: 0.95rem; }
        .contact-btn { background: #3b82f6; padding: 10px 20px; border-radius: 8px; color: white; text-decoration: none; font-weight: bold; }

        /* --- HERO SECTION (MATCHING IMAGE 4 LAYOUT) --- */
        .hero {
            display: grid; 
            grid-template-columns: 1.2fr 1fr; 
            gap: 40px; 
            padding: 80px 8%; 
            align-items: center; 
            max-width: 1400px; 
            margin: 0 auto;
        }

        .hero-text h1 { font-size: 64px; line-height: 1.1; margin: 20px 0; }
        .hero-text h1 span {
            background: linear-gradient(90deg, var(--primary-cyan), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- BOOKING FORM STYLES (AS PROVIDED) --- */
        .form-col { display: flex; justify-content: flex-end; }
        .booking-card {
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 420px;
        }

        .booking-card h3 { margin-bottom: 20px; font-size: 22px; color: white; }
        .booking-card input, .booking-card select, .booking-card textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .booking-card button {
            width: 100%;
            padding: 14px;
            background: var(--primary-cyan);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .booking-card button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* --- SUCCESS POPUP WITH CLAP IMAGE --- */
        #successPopup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            border: 1px solid var(--primary-cyan);
            box-shadow: 0 0 30px rgba(0, 198, 255, 0.3);
            width: 90%;
            max-width: 400px;
        }

        .clap-img { width: 80px; margin-bottom: 20px; }
        #successPopup h3 { color: var(--primary-cyan); font-size: 24px; margin-bottom: 10px; }
        #successPopup p { color: white; }
        #closePopup {
            margin-top: 25px;
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        canvas#dotsBackground { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; text-align: center; }
            .form-col { justify-content: center; }
            .hero-text h1 { font-size: 48px; }
        }
    </style>
</head>
<body>

<canvas id="dotsBackground"></canvas>

<nav>
    <a href="#" class="logo">Deploy<span>Lynx</span></a>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Case Studies</a>
        <a href="#">About</a>
    </div>
    <a href="#" class="contact-btn">Contact</a>
</nav>

<section class="hero">
    <div class="hero-text">
        <p style="color: var(--primary-cyan); text-transform: uppercase; letter-spacing: 2px; font-weight: bold; font-size: 14px;">Direct Communication</p>
        <h1>Ready to <br><span>architect <br>the future?</span></h1>
        <p>DeployLynx builds scalable, secure, and production-ready systems. Schedule your deep dive into cloud reliability today.</p>
    </div>

    <div class="form-col">
        <div class="booking-card">
            <h3>Schedule Your Call</h3>
            <form id="scheduleForm">
                <input type="text" name="Name" placeholder="Your Name" required>
                <input type="email" name="Email" placeholder="Your Email" required>
                <select name="Topic" required>
                    <option value="" disabled selected>Select a Topic</option>
                    <option value="Cloud Migration">Cloud Migration</option>
                    <option value="Kubernetes">Kubernetes Architecture</option>
                    <option value="CI/CD">CI/CD Pipeline</option>
                    <option value="Other">Other</option>
                </select>
                <input type="date" name="Date" required>
                <select name="Time" required>
                    <option value="" disabled selected>Select Time (PKT)</option>
                    <option value="09:00 AM">09:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="03:00 PM">03:00 PM</option>
                </select>
                <textarea name="Message" rows="3" placeholder="Brief Description"></textarea>
                <button type="submit" id="submitBtn">Book Consultation</button>
            </form>
        </div>
    </div>
</section>

<div id="successPopup">
    <img src="https://cdn-icons-png.flaticon.com/512/1642/1642331.png" alt="Success" class="clap-img">
    <h3>Message Sent!</h3>
    <p>Shortly we will contact with you.</p>
    <button id="closePopup">Close</button>
</div>

<script>
    const form = document.getElementById('scheduleForm');
    const btn = document.getElementById('submitBtn');
    const popup = document.getElementById('successPopup');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Processing...";

        const formData = new FormData(form);
        const scriptURL = "https://script.google.com/macros/s/AKfycbz-n69boQvKuZ1b2eomihHO87Tee7ZkyIb2vTpXNoJRapY9KkUY5TqDPMWGvAIglsEm/exec";

        // 1. Send to Google Sheets
        fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
        .then(() => {
            // 2. Send to Formspree
            return fetch("https://formspree.io/f/xpqykbvr", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
        })
        .then(() => {
            // Success Effects
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            popup.style.display = "block";
            form.reset();
            btn.disabled = false;
            btn.innerText = "Book Consultation";
        })
        .catch(error => {
            console.error('Error!', error);
            alert("Submission failed, please try again.");
            btn.disabled = false;
            btn.innerText = "Book Consultation";
        });
    });

    document.getElementById('closePopup').onclick = () => {
        popup.style.display = "none";
    };

    // Animated Background
    const canvas = document.getElementById("dotsBackground");
    const ctx = canvas.getContext("2d");
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    let dots = Array(60).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vy: 0.5 }));
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(0,198,255,0.2)";
        dots.forEach(d => {
            d.y += d.vy; if(d.y > canvas.height) d.y = 0;
            ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, 7); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();
</script>

</body>
</html>
